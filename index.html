<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RPG Game</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    <style>
        body { 
            font-family: monospace; 
            background: #111; 
            color: #0f0; 
            padding: 20px; 
            margin: 0;
        }
        #terminal { 
            background: #000; 
            padding: 15px; 
            height: 65vh; 
            overflow-y: auto; 
            border: 2px solid #0f0;
            white-space: pre-wrap;
            margin-bottom: 10px;
        }
        #inputBox { 
            width: 100%; 
            background: #000; 
            color: #0f0; 
            border: 2px solid #0f0; 
            padding: 10px; 
            font-family: monospace;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>Simple RPG Game</h1>
    <div id="terminal"></div>
    <input type="text" id="inputBox" placeholder="Type command and press Enter..." autofocus>

    <script type="py">
from pyscript import display   # safer way to output text
from js import document

# Game variables
inventory = []
currentRoom = "Hall"

rooms = {
    "Hall": {"south": "Kitchen", "east": "Dining Room", "item": "key"},
    "Kitchen": {"north": "Hall", "item": "monster"},
    "Dining Room": {"west": "Hall", "south": "Garden", "item": "potion"},
    "Garden": {"north": "Dining Room"}
}

def print_to_terminal(text):
    term = document.getElementById("terminal")
    term.innerHTML += str(text) + "<br>"
    term.scrollTop = term.scrollHeight

def showInstructions():
    print_to_terminal("<b>RPG Game</b>")
    print_to_terminal("========")
    print_to_terminal("Get to the Garden with a <b>key</b> and a <b>potion</b>")
    print_to_terminal("Avoid the monster!")
    print_to_terminal("")
    print_to_terminal("Commands:")
    print_to_terminal("  go north / south / east / west")
    print_to_terminal("  get key / get potion")

def showStatus():
    print_to_terminal("---------------------------")
    print_to_terminal(f"You are in the <b>{currentRoom}</b>")
    print_to_terminal(f"Inventory : {inventory}")
    if "item" in rooms.get(currentRoom, {}):
        print_to_terminal(f"You see a <b>{rooms[currentRoom]['item']}</b>")
    print_to_terminal("---------------------------")

def process_command(cmd):
    global currentRoom, inventory
    if not cmd:
        return
    parts = cmd.lower().strip().split()
    if not parts:
        return

    if parts[0] == "go":
        if len(parts) < 2:
            print_to_terminal("Go where?")
            return
        direction = parts[1]
        if direction in rooms[currentRoom]:
            currentRoom = rooms[currentRoom][direction]
            if rooms[currentRoom].get("item") == "monster":
                print_to_terminal('<span style="color:red">The monster got you... GAME OVER!</span>')
                return
            showStatus()
            if currentRoom == "Garden" and "key" in inventory and "potion" in inventory:
                print_to_terminal('<span style="color:lime">You escaped the house... YOU WIN!</span>')
                return
        else:
            print_to_terminal("You can't go that way!")

    elif parts[0] == "get":
        if len(parts) < 2:
            print_to_terminal("Get what?")
            return
        item = parts[1]
        if "item" in rooms[currentRoom] and rooms[currentRoom]["item"] == item:
            inventory.append(item)
            print_to_terminal(f"You picked up the <b>{item}</b>!")
            del rooms[currentRoom]["item"]
            showStatus()
        else:
            print_to_terminal(f"There is no {item} here!")
    else:
        print_to_terminal("I don't understand that command.")

# Simple event handler (no create_proxy needed here)
def on_enter(event):
    if event.key == "Enter":
        input_box = document.getElementById("inputBox")
        cmd = input_box.value.strip()
        if cmd:
            print_to_terminal(f"> {cmd}")
            input_box.value = ""
            process_command(cmd)

# Start the game
showInstructions()
showStatus()

# Attach listener
input_box = document.getElementById("inputBox")
input_box.addEventListener("keydown", on_enter)
input_box.focus()
    </script>

</body>
</html>
